name: Scrape KSE All Share Index

on:
  schedule:
    # Every 5 minutes. GitHub enforces a 5-minute floor on scheduled workflows
    # and may delay runs further during periods of high platform load - this
    # is a target cadence, not a guarantee.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit the updated kse.json

concurrency:
  group: kse-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Pre-built image with Chromium + all OS dependencies already installed,
    # so each run starts fast instead of reinstalling Playwright every time.
    container:
      image: mcr.microsoft.com/playwright:v1.47.0-jammy
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install playwright@1.47.0

      - name: Run scraper
        run: node scrape.js

      - name: Commit updated data
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "kse-scraper-bot"
          git config user.email "actions@users.noreply.github.com"
          git add kse.json debug/ 2>/dev/null || git add kse.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update KSE index data"
          for i in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin HEAD:main; then
                echo "Pushed successfully on attempt $i."
                exit 0
              fi
              echo "Push rejected on attempt $i, retrying..."
            else
              echo "Rebase failed on attempt $i, aborting rebase and retrying..."
              git rebase --abort || true
            fi
            sleep 5
          done
          echo "Failed to push after 5 attempts."
          exit 1

      - name: Upload debug artifacts (only kept when extraction fails)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-snapshot
          path: debug/
          retention-days: 3
          if-no-files-found: ignore
